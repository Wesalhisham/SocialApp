 <section class="border border-slate-200 rounded-[16px] p-4 bg-white" aria-label="Comments">
          <div class="flex items-center gap-2 mb-2">
            <h3 class="font-bold text-[15px] text-slate-900">Comments</h3>
            <span class="bg-blue-100 text-blue-600 text-[12px] font-bold px-2 py-0.5 rounded-full"
              >{{commentList.length}}</span
            >
          </div>

<!----------------------- comment details  ------------------------------------->
         @for (comment of commentList; track comment._id) {
             <div class="flex gap-2 mb-4 group">
            <img
              [src]="comment.commentCreator.photo"
              [alt]="comment.commentCreator.name"
              class="w-8 h-8 rounded-full object-cover shrink-0 mt-1 bg-slate-100 border border-slate-50"
            />

            <div class="flex-1 flex flex-col items-start min-w-0">
              <div class="bg-slate-100 rounded-2xl rounded-tl-none px-3.5 py-2.5 max-w-full">
                <div class="flex items-center gap-1.5 mb-0.5">
                  <span class="text-[13px] font-bold text-slate-900 hover:underline cursor-pointer"
                    >{{comment.commentCreator.name}}</span
                  >
                </div>

                <div class="flex items-center gap-1 text-[12px] text-slate-500 mb-1">
                  <span>@{{comment.commentCreator.username}}</span>
                  <span>&middot;</span>
                  <span>{{comment.createdAt}}</span>
                </div>

               @if (comment.content) {
                 <p class="text-[14px] text-slate-800 wrap-break-word">
                    {{comment.content}}
                </p>
               }
               
               @if (comment.imge) {
                <img [src]="comment.imge" alt="notfound" class="w-full h-[130px] object-cover">
               }
              </div>

              <div
                class="flex items-center gap-3 mt-1 ml-2 text-[12px] text-slate-500 font-semibold"
              >
                <span class="cursor-pointer hover:underline">{{comment.createdAt}}</span>
                <button class="cursor-pointer hover:underline">Like ({{comment.likes.length}})</button>
                <!-- <button
                  class="w-6 h-6 flex items-center justify-center rounded-full hover:bg-slate-100 text-slate-400 opacity-0 group-hover:opacity-100 transition-opacity"
                >
                </button> -->
                <div class="relative group ">
                      

              <button
                id="dropdownMenuIconButton"
                data-dropdown-toggle="dropdownDots"
                class="text-heading cursor-pointer bg-neutral-primary box-border border border-transparent hover:bg-neutral-secondary-medium focus:ring-neutral-tertiary font-medium leading-5 rounded-base text-sm p-2 focus:outline-none"
                type="button"
              >
              <i class="fa-solid fa-ellipsis"></i>
               
              </button>

              <!-- Dropdown menu -->
              <div
                id="dropdownDots"
                class="z-30 hidden  group-hover:block absolute right-0 bg-neutral-primary-medium border border-default-medium rounded-base shadow-lg w-44"
              >
                <ul
                  class="p-2 text-sm text-body font-medium"
                  aria-labelledby="dropdownMenuIconButton"
                >
                  <li>
                   
                    <button
                    (click)="deletPost(postId ,comment._id)"
                      class="inline-flex cursor-pointer text-red-700 items-center w-full p-2 hover:bg-neutral-tertiary-medium hover:text-heading rounded"
                    >

                      Delete post
                      @if(isloading){
                    <i class="fa-solid fa-spinner fa-spin"></i>
                }
                    </button>
                  </li>
                  <li>
  <button
    class="inline-flex cursor-pointer items-center w-full p-2 hover:bg-neutral-tertiary-medium hover:text-heading rounded"
    (click)="startUpdateComment(comment)"
  >
    Update Comment
  </button>
</li>
                </ul>
              </div>
                </div>
              </div>
            </div>
          </div>
         }

<!---------------------------- Create Comments ------------------------------------- -->
         <form #form (submit)="submitForm($event, form)">
  <div class="flex gap-2 mt-4">
    <img [src]="userPhoto" alt="user" class="w-8 h-8 rounded-full object-cover shrink-0 mt-1 bg-slate-100 border border-slate-50" />

    <div class="flex-1 bg-slate-100 border border-transparent focus-within:border-blue-300 focus-within:ring-4 focus-within:ring-blue-50 focus-within:bg-white transition-all rounded-[20px] p-2 flex flex-col">
      
      <textarea
        [formControl]="commentBody"
        class="w-full bg-transparent border-none text-[14px] text-slate-800 placeholder-slate-500 resize-none outline-none px-2 pt-1 pb-3 min-h-[60px]"
        [placeholder]="updateMode ? 'Update your comment...' : 'Comment as ...'"
      ></textarea>

      <!-- صورة التعليق -->
      @if (imgUrlcomment) {
        <div class="relative">
          <div (click)="deletImg()" class="absolute top-3 right-1 cursor-pointer hover:bg-gray-500 hover:text-white bg-gray-200 size-9 rounded-full flex justify-center items-center">
              <i class="fa-solid fa-x"></i>
          </div>
          <div>
            <img [src]="imgUrlcomment" class="w-full max-h-90 object-cover rounded shadow mt-2">
          </div>
        </div>
      }
      
      <hr class="border-t border-slate-200 my-2">

      <div class="flex items-center justify-between px-1">
        <div class="flex items-center gap-1">
          <input #fileInputcomment (change)="changeImgecomment($event)" type="file" id="comment-file" class="hidden" />
          <label for="comment-file" class="flex cursor-pointer items-center gap-2 text-slate-600 hover:bg-slate-50 px-2 py-1.5 rounded-lg transition-colors group">
            <i class="fa-regular fa-image text-[#22c55e] text-[1.1rem] group-hover:scale-110 transition-transform"></i>
            <span class="text-[14px] font-semibold text-slate-600">Photo/video</span>
          </label>
        </div>

        <button class="w-8 cursor-pointer h-8 rounded-full bg-mainColor hover:bg-blue-800 text-white flex items-center justify-center transition-colors">
          @if(isload){
            <i class="fa-solid fa-spinner fa-spin"></i>
          }@else{
            <i class="fa-solid fa-paper-plane text-[13px] ms-1 mt-.5"></i>
          }
        </button>
      </div>
    </div>
  </div>
</form>
		  
</section>
